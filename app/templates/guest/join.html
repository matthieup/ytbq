{% extends "base.html" %}

{% block title %}YTBQ - Join{% endblock %}

{% block extra_head %}
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
{% endblock %}

{% block content %}
<div class="guest-container">
    <div id="nameScreen" class="name-screen">
        <header class="guest-header">
            <h1>YTBQ</h1>
            <p>Welcome! Enter your name to join</p>
        </header>
        <form class="name-form" id="nameForm">
            <input type="text" 
                   id="nameInput" 
                   placeholder="Your name..." 
                   autocomplete="off"
                   maxlength="20"
                   autofocus
                   required>
            <button type="submit">Join</button>
        </form>
    </div>
    
    <div id="mainScreen" class="main-screen" style="display: none;">
        <header class="guest-header">
            <h1>YTBQ</h1>
            <p>Add a video to the queue</p>
        </header>
        
        <div class="search-section">
            <form class="search-form" id="searchForm">
                <input type="text" 
                       id="searchInput" 
                       placeholder="Search YouTube videos..." 
                       autocomplete="off"
                       autofocus>
                <button type="submit" id="searchBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </button>
            </form>
        </div>
        
        <div class="results-section" id="resultsSection">
            <div class="results-list" id="resultsList"></div>
        </div>
        
        <div class="guest-queue-section">
            <h3>Up Next (<span id="queueCount">0</span>)</h3>
            <div class="guest-queue-list" id="guestQueueList">
                <div class="empty-queue">
                    <p>No videos in queue</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/guest.js"></script>
{% endblock %}
