version: '3.8'

services:
  ytbq:
    build: .
    container_name: ytbq
    ports:
      - "8000:8000"
    volumes:
      # Persist video cache between restarts
      - ./video_cache:/app/video_cache
      # Persist database
      - ./ytbq.db:/app/ytbq.db
      # Mount config if needed
      - ./config.json:/app/config.json:ro
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
