version: '3.8'

services:
  ytbq:
    build: .
    container_name: ytbq
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Use tmpfs for video cache to limit SD card writes
      - type: tmpfs
        target: /app/video_cache
        tmpfs:
          size: 2G
      # Persist database
      - ./ytbq.db:/app/ytbq.db
      # Mount config if needed
      - ./config.json:/app/config.json:ro
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - BASE_URL=${BASE_URL:-}
      - VIDEO_QUALITY=${VIDEO_QUALITY:-}
      - ALLOW_MULTIPLE_VIDEOS=${ALLOW_MULTIPLE_VIDEOS:-}
      - MULTIPLE_VIDEOS_LOCKED=${MULTIPLE_VIDEOS_LOCKED:-}
      - AUTO_QUEUE_ENABLED=${AUTO_QUEUE_ENABLED:-}
      - AUTO_QUEUE_LOCKED=${AUTO_QUEUE_LOCKED:-}
      - LOGO_PATH=${LOGO_PATH:-}
      - MAX_DURATION_SECONDS=${MAX_DURATION_SECONDS:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
